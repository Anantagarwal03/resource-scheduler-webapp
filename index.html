<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SRB Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/logo.png">
</head>

<body>

<div class="login-page">
  <div class="login-container">

    <div class="login-image"></div>

    <div class="login-form">
      <div class="glass">

        <h2 class="logo">SRB</h2>
        <h2>Smart Resource Booking</h2>
        <p class="subtitle">Manage rooms efficiently</p>

        <!-- ✅ FIXED -->
        <input type="email" id="email" placeholder="abc@test.com">

        <div class="password-wrapper">
          <input type="password" id="password" placeholder="••••">
          <span id="togglePassword">👁</span>
        </div>

        <button id="loginBtn">Login</button>

        <p class="demo">Demo: abc@test.com / 1234</p>

        <p class="link-text">
          Don’t have an account?
          <!-- ✅ FIXED -->
          <a href="signup.html">Sign Up</a>
        </p>

      </div>
    </div>

  </div>
</div>

<!-- ✅ VERY IMPORTANT: script at bottom -->
<script src="js/auth.js"></script>

</body>
</html>
